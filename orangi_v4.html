<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Orangi Migraine — AI 협진 시스템</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=IBM+Plex+Sans+KR:wght@300;400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://accounts.google.com/gsi/client" async></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --sb:#12171f;--sb2:#1c2330;--sb3:#252d3a;
  --bg:#f2f0eb;--sf:#fff;--sf2:#f9f7f4;
  --bd:#e0dbd2;--bd2:#d0c9be;
  --ink:#1a1917;--mu:#7a7672;--mu2:#a09b96;
  --r1:#3b82f6;--r2:#8b5cf6;--r3:#f59e0b;
  --ac:#2c5f8a;--gr:#2d6a4f;--re:#c03030;
  --font:'IBM Plex Sans KR',sans-serif;
  --mono:'IBM Plex Mono',monospace;
  --serif:'DM Serif Display',serif;
}
html,body{height:100%;overflow:hidden}
body{font-family:var(--font);background:var(--bg);color:var(--ink);display:flex;font-size:14px}

/* SIDEBAR */
aside{width:236px;min-width:236px;background:var(--sb);display:flex;flex-direction:column;height:100vh;overflow-y:auto}
.logo{padding:18px 18px 14px;border-bottom:1px solid #1e2a3a}
.logo-title{font-family:var(--serif);color:#fff;font-size:1.05rem;line-height:1.35}
.logo-sub{font-size:.67rem;color:#3d5068;margin-top:3px;font-family:var(--mono);letter-spacing:.06em}
.sb-sect{padding:10px 0}
.sb-lbl{font-size:.62rem;font-weight:600;letter-spacing:.12em;text-transform:uppercase;color:#3d4f63;padding:0 18px;margin-bottom:5px}
.sb-btn{display:flex;align-items:center;gap:9px;padding:8px 18px;cursor:pointer;border:none;background:none;width:100%;text-align:left;color:#7a8fa5;font-family:var(--font);font-size:.8rem;transition:background .15s}
.sb-btn:hover{background:var(--sb2);color:#c0cad6}
.sb-btn.active{background:var(--sb3);color:#fff}
.sb-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.sb-badge{font-size:.65rem;font-family:var(--mono);background:#1a2535;color:#3d5a75;padding:1px 5px;border-radius:3px;margin-left:auto}
.sb-div{height:1px;background:#1a2535;margin:4px 18px}
.drive-status{padding:8px 18px;font-size:.72rem;display:flex;align-items:center;gap:7px}
.drive-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.sb-foot{margin-top:auto;padding:12px 16px;border-top:1px solid #1a2535;display:flex;flex-direction:column;gap:6px}
.sb-foot-btn{width:100%;background:none;border:1px solid #2a3a50;border-radius:6px;padding:6px 10px;color:#5a7a95;font-size:.72rem;cursor:pointer;font-family:var(--font);transition:all .2s;text-align:left}
.sb-foot-btn:hover{background:#1c2a3a;color:#90b0cc}

/* MAIN */
main{flex:1;display:flex;flex-direction:column;height:100vh;overflow:hidden}
.topbar{background:var(--sf);border-bottom:1.5px solid var(--bd);padding:0 22px;display:flex;align-items:center;gap:0;flex-shrink:0;height:50px}
.topbar-title{font-family:var(--serif);font-size:.95rem;color:var(--ink);margin-right:auto}
.content{flex:1;overflow-y:auto;padding:18px 22px}

/* CARDS */
.card{background:var(--sf);border:1.5px solid var(--bd);border-radius:10px;padding:18px;margin-bottom:14px}
.card-title{font-family:var(--serif);font-size:.95rem;font-weight:400;margin-bottom:12px;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.badge{font-size:.62rem;font-weight:700;padding:2px 7px;border-radius:4px;letter-spacing:.05em;text-transform:uppercase}
.badge-blue{background:#eff6ff;color:#1d4ed8}
.badge-green{background:#f0fdf4;color:#15803d}
.badge-orange{background:#fff7ed;color:#c2410c}
.badge-purple{background:#faf5ff;color:#7c3aed}
.badge-red{background:#fff0f0;color:#c03030}

/* DRIVE CONNECT VIEW */
.connect-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:20px;text-align:center}
.connect-icon{font-size:3rem;margin-bottom:8px}
.connect-title{font-family:var(--serif);font-size:1.3rem}
.connect-desc{font-size:.87rem;color:var(--mu);line-height:1.7;max-width:420px}
.btn-connect{background:var(--ac);color:#fff;border:none;border-radius:10px;padding:13px 32px;font-size:.95rem;font-weight:600;cursor:pointer;font-family:var(--font);transition:all .2s;display:flex;align-items:center;gap:10px}
.btn-connect:hover{background:#1e4a72;transform:translateY(-1px)}
.connect-note{font-size:.75rem;color:var(--mu2);max-width:380px;line-height:1.6}

/* HOME VIEW */
.home-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px}
.accum-section{margin-bottom:8px}
.accum-label{font-size:.68rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--mu);margin-bottom:6px}
.accum-list{display:flex;flex-direction:column;gap:4px}
.accum-item{font-size:.82rem;line-height:1.6;padding:6px 10px;border-radius:6px;border-left:3px solid}
.accum-item.consensus{border-color:var(--gr);background:#f0fdf4;color:#1a4a2a}
.accum-item.discarded{border-color:var(--mu2);background:#f9f7f4;color:var(--mu);text-decoration:line-through}
.accum-item.unresolved{border-color:var(--r3);background:#fffbeb;color:#7a4a00}
.accum-empty{font-size:.8rem;color:var(--mu2);font-style:italic;padding:8px 0}
.btn-new-session{width:100%;background:var(--ink);color:#fff;border:none;border-radius:10px;padding:14px;font-size:.9rem;font-weight:600;cursor:pointer;font-family:var(--font);transition:all .2s;display:flex;align-items:center;justify-content:center;gap:9px;margin-bottom:14px}
.btn-new-session:hover{background:#333;transform:translateY(-1px)}
.session-hist-item{background:var(--sf);border:1.5px solid var(--bd);border-radius:10px;padding:14px 16px;margin-bottom:8px;cursor:pointer;transition:border-color .2s}
.session-hist-item:hover{border-color:var(--ac)}
.hist-date{font-size:.72rem;color:var(--mu);font-family:var(--mono);margin-bottom:3px}
.hist-q{font-size:.85rem;font-weight:500}
.hist-meta{font-size:.72rem;color:var(--mu2);margin-top:4px}

/* SESSION VIEW */
.q-bar{background:var(--sf);border:1.5px solid var(--bd);border-radius:10px;padding:13px 16px;margin-bottom:14px}
.q-label{font-size:.67rem;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--mu);margin-bottom:5px}
.q-bar textarea{width:100%;border:none;outline:none;font-family:var(--font);font-size:.9rem;line-height:1.55;resize:none;background:transparent;color:var(--ink)}

.round-bar{display:flex;align-items:center;gap:10px;margin-bottom:14px;padding:10px 14px;background:var(--sb);border-radius:10px;flex-wrap:wrap}
.round-pill{font-size:.72rem;font-weight:700;padding:5px 14px;border-radius:20px;border:1.5px solid;font-family:var(--mono);cursor:default}
.round-pill.done{opacity:.5}
.round-pill.active{color:#fff}
.round-pill.waiting{background:transparent}

.ai-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:14px}
.ai-card{background:var(--sf);border:1.5px solid var(--bd);border-radius:10px;overflow:hidden;transition:border-color .3s}
.ai-card.generating{border-color:#3b82f640;animation:pb 1.5s infinite}
@keyframes pb{0%,100%{border-color:#3b82f640}50%{border-color:#3b82f6bb}}
.ai-card.done{border-color:#10b98155}
.ai-card.error{border-color:#ef444455}
.ai-head{display:flex;align-items:center;gap:8px;padding:9px 13px;border-bottom:1px solid var(--bd);background:var(--sf2)}
.ai-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.ai-name{font-size:.73rem;font-weight:600;letter-spacing:.05em;text-transform:uppercase}
.ai-role{font-size:.63rem;color:var(--mu2);font-family:var(--mono);margin-left:4px}
.ai-chip{font-size:.62rem;font-family:var(--mono);padding:2px 6px;border-radius:3px;margin-left:auto}
.ai-body textarea{width:100%;border:none;outline:none;padding:11px 13px;font-family:var(--font);font-size:.84rem;line-height:1.65;resize:vertical;min-height:150px;background:transparent;color:var(--ink)}
.ai-body textarea.gen{background:#f0f7ff;color:var(--mu)}

.round-action-bar{background:var(--sf);border:1.5px solid var(--bd);border-radius:10px;padding:13px 16px;margin-bottom:14px;display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.btn-run-round{background:var(--ac);color:#fff;border:none;border-radius:8px;padding:10px 22px;font-size:.85rem;font-weight:600;cursor:pointer;font-family:var(--font);transition:all .2s;display:flex;align-items:center;gap:8px;white-space:nowrap}
.btn-run-round:hover:not(:disabled){background:#1e4a72}
.btn-run-round:disabled{opacity:.5;cursor:not-allowed}
.btn-run-round.green{background:var(--gr)}
.btn-run-round.green:hover:not(:disabled){background:#1d4a35}
.run-note{font-size:.75rem;color:var(--mu);flex:1}

.final-card{background:var(--sf);border:1.5px solid var(--bd);border-radius:10px;padding:18px;margin-bottom:12px}
.final-card h3{font-family:var(--serif);font-size:.95rem;font-weight:400;margin-bottom:10px;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.fcontent{font-size:.86rem;line-height:1.78;color:#2a2a2a}
.fcontent ul{padding-left:18px}
.fcontent li{margin-bottom:4px}
.divider{height:1px;background:var(--bd);margin:10px 0}
.ai-op{padding:7px 11px;border-radius:7px;margin-bottom:5px;border-left:3px solid;font-size:.82rem;line-height:1.65}

/* BTNS */
.btn-primary{background:var(--ink);color:#fff;border:none;border-radius:8px;padding:10px 22px;font-size:.85rem;font-weight:600;cursor:pointer;font-family:var(--font);transition:all .2s;display:flex;align-items:center;gap:8px}
.btn-primary:hover:not(:disabled){background:#333}
.btn-primary:disabled{opacity:.5;cursor:not-allowed}
.spin{width:13px;height:13px;border:2px solid rgba(255,255,255,.25);border-top-color:#fff;border-radius:50%;animation:sp .7s linear infinite;display:none}
@keyframes sp{to{transform:rotate(360deg)}}

/* MODAL */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:999;display:none;align-items:center;justify-content:center}
.overlay.show{display:flex}
.modal{background:var(--sf);border-radius:12px;width:620px;max-height:85vh;display:flex;flex-direction:column;box-shadow:0 20px 60px rgba(0,0,0,.25);overflow:hidden}
.modal-head{display:flex;align-items:center;justify-content:space-between;padding:16px 20px;border-bottom:1px solid var(--bd)}
.modal-head h3{font-family:var(--serif);font-size:1rem;font-weight:400}
.modal-close{background:none;border:none;font-size:1.1rem;cursor:pointer;color:var(--mu);padding:4px}
.modal-body{flex:1;overflow-y:auto;padding:18px 20px}
.modal-foot{padding:12px 20px;border-top:1px solid var(--bd);display:flex;justify-content:flex-end;gap:10px}
.key-group{margin-bottom:18px}
.key-row{display:flex;align-items:center;gap:8px;margin-bottom:4px}
.key-label{font-size:.78rem;font-weight:600;display:flex;align-items:center;gap:8px}
.key-link{font-size:.7rem;color:var(--ac);text-decoration:none;margin-left:auto}
.key-link:hover{text-decoration:underline}
.key-input-row{display:flex;gap:8px}
.key-input{flex:1;border:1.5px solid var(--bd);border-radius:7px;padding:8px 12px;font-family:var(--mono);font-size:.78rem;color:var(--ink);outline:none;transition:border-color .2s;background:#fafaf7}
.key-input:focus{border-color:var(--ac)}
.key-input.set{border-color:#10b98155;background:#f0fdf4}
.key-note{font-size:.69rem;color:var(--mu2);line-height:1.5;margin-top:4px}
.btn-vis{background:none;border:1px solid var(--bd);border-radius:5px;padding:6px 10px;font-size:.72rem;cursor:pointer;color:var(--mu);white-space:nowrap}
.btn-save{background:var(--ink);color:#fff;border:none;border-radius:7px;padding:8px 20px;font-size:.82rem;font-weight:600;cursor:pointer;font-family:var(--font)}
.btn-cancel{background:none;border:1.5px solid var(--bd);border-radius:7px;padding:8px 16px;font-size:.82rem;color:var(--mu);cursor:pointer;font-family:var(--font)}

/* TOAST */
.toast{position:fixed;bottom:24px;right:24px;background:var(--ink);color:#fff;padding:10px 18px;border-radius:8px;font-size:.82rem;z-index:9999;transform:translateY(80px);opacity:0;transition:all .3s;pointer-events:none}
.toast.show{transform:translateY(0);opacity:1}

/* MISC */
.hint{font-size:.8rem;color:var(--mu);padding:30px;text-align:center;font-style:italic;line-height:1.7}
.err-box{background:#fff0f0;border:1px solid #ffc0c0;border-radius:8px;padding:11px 14px;color:var(--re);font-size:.82rem;margin-bottom:12px}
.loading-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:14px;color:var(--mu)}
.loading-spin{width:28px;height:28px;border:3px solid var(--bd);border-top-color:var(--ac);border-radius:50%;animation:sp .8s linear infinite}

@media(max-width:960px){.ai-grid{grid-template-columns:1fr}.home-grid{grid-template-columns:1fr}}
</style>
</head>
<body>

<!-- SIDEBAR -->
<aside>
  <div class="logo">
    <div class="logo-title">Orangi Migraine<br>AI 협진 시스템</div>
    <div class="logo-sub">MULTI-AI CONSILIUM v4</div>
  </div>

  <div class="sb-sect">
    <div class="sb-lbl">Drive 상태</div>
    <div class="drive-status" id="drive-status">
      <div class="drive-dot" style="background:#6a4a2a"></div>
      <span style="font-size:.72rem;color:#5a6a7e">연결 안됨</span>

  </div>

  <div class="sb-div"></div>

  <div class="sb-sect">
    <div class="sb-lbl">메뉴</div>
    <button class="sb-btn" onclick="switchView('home',this)" id="nav-home">
      🏠 홈 / 누적 기록
    </button>
    <button class="sb-btn" onclick="switchView('session',this)" id="nav-session">
      💬 현재 세션
      <span class="sb-badge" id="session-round-badge" style="display:none">R1</span>

    <button class="sb-btn" onclick="switchView('history',this)" id="nav-history">

    </button>
  </div>

  <div class="sb-foot">

    <button class="sb-foot-btn" onclick="manualBackup()">📦 지금 백업</button>
  </div>
</aside>

<!-- MAIN -->
<main>
  <div class="topbar">
    <div class="topbar-title" id="topbar-title">Orangi Migraine AI 협진</div>
  </div>
  <div class="content" id="content"></div>
</main>

<!-- KEYS MODAL -->
<div class="overlay" id="keys-modal">
  <div class="modal">
    <div class="modal-head">
      <h3>🔑 API 키 설정</h3>
      <button class="modal-close" onclick="closeModal('keys-modal')">✕</button>
    </div>
    <div class="modal-body" id="keys-body"></div>
    <div class="modal-foot">
      <button class="btn-cancel" onclick="closeModal('keys-modal')">닫기</button>
      <button class="btn-save" onclick="saveKeys()">저장</button>
    </div>
  </div>
</div>

<!-- CTX MODAL -->
<div class="overlay" id="ctx-modal">
  <div class="modal" style="width:720px">
    <div class="modal-head">
      <h3>📋 환자 컨텍스트 / SSOT</h3>
      <button class="modal-close" onclick="closeModal('ctx-modal')">✕</button>
    </div>
    <div class="modal-body">
      <textarea id="ctx-ta" style="width:100%;min-height:420px;border:1.5px solid var(--bd);border-radius:8px;padding:12px;font-family:var(--mono);font-size:.76rem;line-height:1.68;resize:none;color:var(--ink);outline:none;background:#fafaf7"></textarea>
    </div>
    <div class="modal-foot">
      <button class="btn-cancel" onclick="closeModal('ctx-modal')">취소</button>
      <button class="btn-save" onclick="saveCtx()">저장 (Drive 동기화)</button>
    </div>
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script>
// ═══════════════════════════════════════════════
// CONSTANTS
// ═══════════════════════════════════════════════
const CLIENT_ID = '103056429713-6ne324793lgc09nl9rkjqonlg4pcd12i.apps.googleusercontent.com';
const SCOPES = 'https://www.googleapis.com/auth/drive.file';

const DEFAULT_CONTEXT = `[오랑이 rCM 협진 — SSOT 컨텍스트 / 기준: 2026-03-20]

■ 환자 기본
- 김나연(오랑이), 여성 28세(1997년생), 체중 39~42kg
- 주진단: 난치성 만성 편두통(rCM)
- 동반: MDD, OCD, 불안장애, vasovagal syncope 병력
- 특이: 저혈압 경향, 약물 민감도 높음, 유당불내증, 후두신경 감압술(효과 없음)

■ 핵심 기전 (작업 가설)
- Central Sensitization 경향 강함
- TCC 패턴(C2-3→V1 전이) 임상적 의심
- GI stasis/흡수 지연 축이 flare와 반복 연관
- 자율신경 불안정성이 headache wave와 얽힘
- Phonophobia: 저주파 진동음에 극도로 취약
- 공복/저섭취/피로/수면분절이 파동 증폭

■ 치료 반응
유의 반응: GON block 1~3차(clear responder), Metoclopramide(GI/흡수축), 수면, Propranolol 10mg(도움 신호)
실패/배제: Triptan, CGRP mAb, Botox, Atogepant(변비), 후두신경 감압술, SPG MAD

■ 현재 경과 (3/20 기준)
- 패턴: Prolonged waxing-waning cluster형 (3/9~현재)
- NRS 4~5, 전두/측두부 좌우 이동
- AAP 500mg 부분반응/무반응
- 3월 acute-med day: 약 9일 (목표: 월 10일 이내)
- GON4 타이밍 검토 중 (GON3 이후 29일 경과)

■ SSOT 원칙
- 팩트 / 해석 / 전략 반드시 분리
- 확정 / 강한 추정 / 가설 엄격히 구분
- GON3 sustained benefit: 불명 유지
- MOH: high-risk state, 확진 단정 금지
- Venlafaxine: 단독 인과 확정 금지
- Propranolol: clear responder 단정 금지

■ 금지 표현
- GON wear-off 확정 / MOH 확진 / Drug Holiday 유일한 방법 / Consensus 99%`;

const AI_DEFS = {
  gpt:    {name:'GPT',        color:'#10a37f', role:'SSOT 기준축'},
  claude: {name:'Claude',     color:'#c96442', role:'구조·메타'},
  gemini: {name:'Gemini',     color:'#4285f4', role:'액션 플랜'},
  perp:   {name:'Perplexity', color:'#20808d', role:'데이터 계수'},
};

const ROLE_SYSTEM = {
  gpt: `당신은 오랑이(김나연) rCM 협진 AI입니다. GPT 역할: SSOT 기준축으로서 팩트/해석/전략을 엄격히 분리하고, 확정/추정/가설을 구분하며 답변합니다. 금지 표현을 사용하지 않습니다.`,

  gemini: `당신은 오랑이(김나연) rCM 협진 AI입니다. Gemini 역할: 경고 신호를 포착하고 구체적 액션 플랜과 다음 행동 기준선을 제시합니다. 단, 예측성 문장과 과단정 표현은 피합니다.`,

// 폴더 내 파일 검색 (폴더 ID 지정)
async function driveSearch(name, parentId = null) {
  let q = `name='${name}' and trashed=false`;
  if (parentId) q += ` and '${parentId}' in parents`;
  const res = await fetch(
    `https://www.googleapis.com/drive/v3/files?q=${encodeURIComponent(q)}&fields=files(id,name,modifiedTime)`,
    { headers: { Authorization: 'Bearer ' + S.token } }
  );
  const d = await res.json();
  if (d.error) throw new Error(d.error.message);
  return d.files || [];
}

async function driveRead(fileId) {
  const res = await fetch(`https://www.googleapis.com/drive/v3/files/${fileId}?alt=media`, {
    headers: { Authorization: 'Bearer ' + S.token }
  });
  return res.json();
}

// 파일 생성 (폴더 ID 지정 시 해당 폴더 안에 생성)
async function driveCreate(name, data, parentId = null) {
  const boundary = 'om_bound_x7';
  const metaObj = { name, mimeType: 'application/json' };
  if (parentId) metaObj.parents = [parentId];
  const meta = JSON.stringify(metaObj);
  const body = `--${boundary}\r\nContent-Type: application/json; charset=UTF-8\r\n\r\n${meta}\r\n--${boundary}\r\nContent-Type: application/json\r\n\r\n${JSON.stringify(data)}\r\n--${boundary}--`;
  const res = await fetch('https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart&fields=id', {
    method: 'POST',
    headers: { Authorization: 'Bearer ' + S.token, 'Content-Type': `multipart/related; boundary=${boundary}` },
    body
  });
  const d = await res.json();
  if (d.error) throw new Error(d.error.message);
  return d.id;
}

async function driveUpdate(fileId, data) {
  const res = await fetch(`https://www.googleapis.com/upload/drive/v3/files/${fileId}?uploadType=media`, {
    method: 'PATCH',
    headers: { Authorization: 'Bearer ' + S.token, 'Content-Type': 'application/json' },
    body: JSON.stringify(data)
  });
  const d = await res.json();
  if (d.error) throw new Error(d.error.message);
  return d;
}

// "Orangi Migraine" 폴더 가져오기 (없으면 생성)
async function getOrCreateFolder() {
  const q = `name='${FOLDER_NAME}' and mimeType='application/vnd.google-apps.folder' and trashed=false`;
  const res = await fetch(
    `https://www.googleapis.com/drive/v3/files?q=${encodeURIComponent(q)}&fields=files(id,name)`,
    { headers: { Authorization: 'Bearer ' + S.token } }
  );
  const d = await res.json();
  if (d.error) throw new Error(d.error.message);

  if (d.files?.length > 0) {
    return d.files[0].id;
  }

  // 폴더 없으면 생성
  const createRes = await fetch('https://www.googleapis.com/drive/v3/files?fields=id', {
    method: 'POST',
    headers: { Authorization: 'Bearer ' + S.token, 'Content-Type': 'application/json' },
    body: JSON.stringify({ name: FOLDER_NAME, mimeType: 'application/vnd.google-apps.folder' })
  });
  const cd = await createRes.json();
  if (cd.error) throw new Error(cd.error.message);
  showToast(`📁 "${FOLDER_NAME}" 폴더 생성됨`);
  return cd.id;
}

async function loadMaster() {
  renderLoading('Google Drive에서 오랑이 기록 로드 중...');
  try {
    // 1. "Orangi Migraine" 폴더 확보
    S.folderId = await getOrCreateFolder();

    // 2. 폴더 안에서 master 파일 검색
    const files = await driveSearch('orangi_master.json', S.folderId);
    if (files.length > 0) {
      S.masterFileId = files[0].id;
      S.master = await driveRead(S.masterFileId);
      if (!S.master.accumulated) S.master.accumulated = DEFAULT_MASTER.accumulated;
    } else {
      S.master = JSON.parse(JSON.stringify(DEFAULT_MASTER));
      S.masterFileId = await driveCreate('orangi_master.json', S.master, S.folderId);
      showToast(`✅ "${FOLDER_NAME}/orangi_master.json" 생성됨`);
    }
    await checkWeeklyBackup();
    updateHistCount();
    updateDriveStatusFull();
    switchView('home');
  } catch(e) {
    renderError('Drive 로드 실패: ' + e.message + '\n\n페이지를 새로고침하고 다시 연결해 주세요.');
  }
}

async function saveMaster() {
  if (!S.masterFileId) return;
  S.master.accumulated.last_updated = new Date().toISOString();
  await driveUpdate(S.masterFileId, S.master);
}

async function checkWeeklyBackup() {
  const last = S.master.last_backup ? new Date(S.master.last_backup) : null;
  const daysSince = last ? (Date.now() - last) / 86400000 : 8;
  if (daysSince >= 7) {
    await makeBackup();
  }
}

async function makeBackup() {
  try {
    const date = new Date().toISOString().split('T')[0];
    const name = `orangi_backup_${date}.json`;
    await driveCreate(name, { ...S.master, backup_date: new Date().toISOString() }, S.folderId);
    S.master.last_backup = new Date().toISOString();
    await saveMaster();
    showToast(`📦 백업 완료: ${FOLDER_NAME}/${name}`);
  } catch(e) {
    showToast('⚠️ 백업 실패: ' + e.message, 4000);
  }
}

async function manualBackup() {
  showToast('📦 백업 생성 중...');
  await makeBackup();
}

// ═══════════════════════════════════════════════
// AI API CALLERS
// ═══════════════════════════════════════════════
async function callAI(aiId, system, user) {
  const key = S.keys[aiId];
  if (!key) throw new Error(`${aiId} API 키 없음`);

  if (aiId === 'claude') {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ model: 'claude-sonnet-4-6', max_tokens: 1500, system, messages: [{ role: 'user', content: user }] })
    });
    const d = await res.json();
    if (d.error) throw new Error(d.error.message);
    return d.content.map(c => c.text || '').join('');
  }
  if (aiId === 'gpt') {
    const res = await fetch('https://api.openai.com/v1/chat/completions', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', Authorization: 'Bearer ' + key },
      body: JSON.stringify({ model: 'gpt-5.4', max_tokens: 1500, messages: [{ role: 'system', content: system }, { role: 'user', content: user }] })
    });
    const d = await res.json();
    if (d.error) throw new Error(d.error.message);
    return d.choices[0].message.content;
  }
  if (aiId === 'gemini') {
    const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-3.1-pro-preview:generateContent?key=${key}`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        system_instruction: { parts: [{ text: system }] },
        contents: [{ parts: [{ text: user }] }],
        generationConfig: { maxOutputTokens: 1500 }
      })
    });
    const d = await res.json();
    if (d.error) throw new Error(d.error.message);
    return d.candidates[0].content.parts.map(p => p.text || '').join('');
  }
  if (aiId === 'perp') {
    const res = await fetch('https://api.perplexity.ai/chat/completions', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', Authorization: 'Bearer ' + key },
      body: JSON.stringify({ model: 'sonar', max_tokens: 1500, messages: [{ role: 'system', content: system }, { role: 'user', content: user }] })
    });
    const d = await res.json();
    if (d.error) throw new Error(typeof d.error === 'string' ? d.error : JSON.stringify(d.error));
    return d.choices[0].message.content;
  }
  throw new Error('알 수 없는 AI: ' + aiId);
}

function buildUserPrompt(aiId, roundNum) {
  const sess = S.session;
  const accum = S.master.accumulated;

  // Accumulated knowledge context
  const accumText = [
    accum.established_consensus.length ? `■ 확립된 협진 합의\n${accum.established_consensus.map(x => '- ' + x).join('\n')}` : '',
    accum.discarded_hypotheses.length  ? `■ 폐기된 가설\n${accum.discarded_hypotheses.map(x => '- ' + x).join('\n')}` : '',
    accum.unresolved_issues.length     ? `■ 미해결 쟁점 (추적 중)\n${accum.unresolved_issues.map(x => '- ' + x).join('\n')}` : '',
    accum.clinical_protocols.length    ? `■ 확립된 임상 프로토콜\n${accum.clinical_protocols.map(x => '- ' + x).join('\n')}` : '',
  ].filter(Boolean).join('\n\n');

  const contextSection = `[환자 컨텍스트 / SSOT]\n${S.master.patient_context}${accumText ? '\n\n[누적 협진 지식]\n' + accumText : ''}`;
  const question = sess.question || '(질문 미입력)';

  if (roundNum === 1) {
    return `${contextSection}\n\n[오늘 세션 질문]\n${question}\n\n위 환자 정보와 누적 협진 지식을 바탕으로 분석해 주세요.\n팩트/해석/전략을 분리하고, 확정/추정/가설을 엄격히 구분하세요.`;
  }

  // Round 2, 3: cross-check
  const prevRound = sess.rounds[roundNum - 2];
  const myPrev = prevRound?.answers?.[aiId] || '';
  const others = Object.entries(AI_DEFS)
    .filter(([id]) => id !== aiId && prevRound?.answers?.[id])
    .map(([id, def]) => `▶ [${def.name}] (역할: ${def.role})\n${prevRound.answers[id]}`)
    .join('\n\n---\n\n');

  return `${contextSection}\n\n[오늘 세션 질문]\n${question}\n\n[내 Round ${roundNum - 1} 답변]\n${myPrev}\n\n[다른 AI들의 Round ${roundNum - 1} 답변]\n${others}\n\n다른 AI들의 답변을 검토하고 다음 구조로 답변해 주세요:\n\n1. [흡수할 장점] 다른 AI 답변에서 통합할 포인트\n2. [보완·반박] 수정이 필요한 부분과 이유\n3. [발전된 분석] 최종 개선 답변 (SSOT 원칙 준수)\n4. [이번 라운드 인사이트] 한 줄 요약`;
}

function startNewSession() {
  S.session = {

    date: new Date().toISOString().split('T')[0],
    question: '',
    rounds: [],       // [{round:1, answers:{gpt:'',claude:'',gemini:'',perp:''}}, ...]
    currentRound: 0,  // 0=not started, 1,2,3=in progress, 4=done

    new_discarded: [],

  };
  switchView('session');
  document.getElementById('session-round-badge').style.display = 'inline';
  document.getElementById('session-round-badge').textContent = 'R0';
}

async function runRound(roundNum) {
  if (S.generating) return;
  const q = document.getElementById('q-input')?.value?.trim();
  if (!q) { showToast('❌ 질문을 입력해 주세요.'); return; }
  S.session.question = q;

  const missingKeys = Object.keys(AI_DEFS).filter(id => !S.keys[id]);
  if (missingKeys.length > 0) {
    showToast(`❌ API 키 없음: ${missingKeys.map(id => AI_DEFS[id].name).join(', ')}`);
    return;
  }

  S.generating = true;
  S.session.currentRound = roundNum;
  document.getElementById('session-round-badge').textContent = `R${roundNum}`;

  // Init round data
  if (!S.session.rounds[roundNum - 1]) {
    S.session.rounds[roundNum - 1] = { round: roundNum, answers: {} };
  }

  // Set all cards to loading
  Object.keys(AI_DEFS).forEach(id => setCardStatus(id, 'loading'));

  // Disable run button
  const runBtn = document.getElementById('run-btn');
  if (runBtn) { runBtn.disabled = true; }

  // Call all AIs in parallel
  await Promise.all(Object.keys(AI_DEFS).map(async aiId => {
    try {
      const answer = await callAI(aiId, ROLE_SYSTEM[aiId], buildUserPrompt(aiId, roundNum));
      S.session.rounds[roundNum - 1].answers[aiId] = answer;
      const ta = document.getElementById('ans-' + aiId);
      if (ta) { ta.value = answer; ta.classList.remove('gen'); }
      setCardStatus(aiId, 'done');
    } catch(e) {
      const msg = '⚠️ 오류: ' + e.message;
      S.session.rounds[roundNum - 1].answers[aiId] = msg;
      const ta = document.getElementById('ans-' + aiId);
      if (ta) { ta.value = msg; ta.classList.remove('gen'); }
      setCardStatus(aiId, 'error');
    }
  }));

  S.generating = false;
  if (runBtn) { runBtn.disabled = false; }

  // Re-render action bar to show next round button
  const actionBar = document.getElementById('action-bar');
  if (actionBar) actionBar.innerHTML = renderActionBar(roundNum);
}

function setCardStatus(aiId, status) {
  const card = document.querySelector(`[data-ai="${aiId}"]`);
  if (!card) return;
  card.classList.remove('generating', 'done', 'error');
  if (status === 'loading') card.classList.add('generating');
  if (status === 'done')    card.classList.add('done');
  if (status === 'error')   card.classList.add('error');
  const chip = document.getElementById('chip-' + aiId);
  if (chip) {
    const labels = { loading: '생성중...', done: '완료', error: '오류', idle: '' };
    const colors = { loading: '#1a2535;color:#60a0c8', done: '#0d2a1a;color:#2d8a5a', error: '#2a1010;color:#c05050', idle: 'transparent' };
    chip.textContent = labels[status] || '';
    chip.style.cssText = `background:${colors[status]?.split(';')[0]||'transparent'};color:${colors[status]?.split(';color:')[1]||'inherit'};font-size:.62rem;font-family:var(--mono);padding:2px 6px;border-radius:3px;margin-left:auto`;
  }
}

// ═══════════════════════════════════════════════
// FINAL SUMMARY (Claude)
// ═══════════════════════════════════════════════
async function runFinalSummary() {
  const finalBtn = document.getElementById('final-btn');
  const finalSp  = document.getElementById('final-sp');
  const finalTxt = document.getElementById('final-btn-txt');
  if (finalBtn) finalBtn.disabled = true;
  if (finalSp)  finalSp.style.display = 'block';
  if (finalTxt) finalTxt.textContent = '요약 생성 중...';

  const allRounds = S.session.rounds.map(r =>
    `ROUND ${r.round}:\n` + Object.entries(r.answers).map(([id, ans]) => `[${AI_DEFS[id].name}]\n${ans}`).join('\n\n---\n\n')
  ).join('\n\n' + '═'.repeat(40) + '\n\n');

  const accumSummary = JSON.stringify(S.master.accumulated, null, 2);

  const prompt = `오랑이(김나연) rCM AI 협진 세션을 마무리합니다.

환자 컨텍스트:
${S.master.patient_context}

기존 누적 협진 지식:
${accumSummary}

오늘 질문:
${S.session.question}

전체 라운드 답변:
${allRounds}

아래 JSON으로만 응답하세요 (마크다운 없이):
{
  "session_summary": "오늘 세션 전체 요약 (3-4문장, SSOT 원칙 준수)",
  "new_consensus": ["오늘 새로 확립된 합의 사항 (기존에 없던 것만)"],
  "new_discarded": ["오늘 폐기된 가설 (기존에 없던 것만)"],
  "updated_issues": ["오늘 업데이트된 미해결 쟁점"],
  "new_protocols": ["오늘 확립된 임상 프로토콜 (있는 경우만)"],
  "round_evolution": "라운드를 거치며 분석이 어떻게 발전했는지 2문장",
  "final_recommendation": "최종 권고사항",
  "next_steps": ["다음 행동1", "다음 행동2", "다음 행동3"]
}`;

  try {
    const result = await callAI('claude',
      '당신은 오랑이 rCM 협진 세션 요약 전문가입니다. 반드시 JSON만 출력하세요.',
      prompt
    );
    const parsed = JSON.parse(result.replace(/```json|```/g, '').trim());
    S.session.summary = parsed;

    // Update accumulated knowledge
    const accum = S.master.accumulated;
    if (parsed.new_consensus?.length)  accum.established_consensus.push(...parsed.new_consensus);
    if (parsed.new_discarded?.length)  accum.discarded_hypotheses.push(...parsed.new_discarded);
    if (parsed.updated_issues?.length) {
      accum.unresolved_issues.push(...parsed.updated_issues.filter(x => !accum.unresolved_issues.includes(x)));
    }
    if (parsed.new_protocols?.length)  accum.clinical_protocols.push(...parsed.new_protocols);

    // Save session
    S.session.new_consensus = parsed.new_consensus || [];
    S.session.new_discarded = parsed.new_discarded || [];
    S.session.updated_issues = parsed.updated_issues || [];
    S.master.sessions.unshift({ ...S.session });
    await saveMaster();

    S.session.currentRound = 4; // done
    document.getElementById('session-round-badge').textContent = '완료';
    updateHistCount();

    // Render result
    const area = document.getElementById('summary-area');
    if (area) { area.innerHTML = renderSummaryResult(parsed); area.scrollIntoView({ behavior: 'smooth' }); }

    showToast('✅ 세션 저장 & Drive 동기화 완료!');
  } catch(e) {
    showToast('❌ 요약 실패: ' + e.message, 4000);
  }

  if (finalBtn) finalBtn.disabled = false;
  if (finalSp)  finalSp.style.display = 'none';
  if (finalTxt) finalTxt.textContent = '✅ 세션 종료 & Drive 저장';
}

function renderSummaryResult(r) {
  const steps = (r.next_steps || []).map((s, i) => `<li><strong>Step ${i+1}.</strong> ${esc(s)}</li>`).join('');
  const newCon = (r.new_consensus || []).map(x => `<li>${esc(x)}</li>`).join('');
  const issues = (r.updated_issues || []).map(x => `<li>${esc(x)}</li>`).join('');

  return `
    <div class="final-card">
      <h3>📈 라운드 발전 과정 <span class="badge badge-blue">Evolution</span></h3>
      <div class="fcontent"><p>${esc(r.round_evolution || '')}</p></div>
    </div>
    <div class="final-card">
      <h3>✅ 오늘 세션 요약</h3>
      <div class="fcontent"><p>${esc(r.session_summary || '')}</p></div>
    </div>
    ${newCon ? `<div class="final-card"><h3>🆕 새로 확립된 합의 <span class="badge badge-green">누적 저장됨</span></h3><div class="fcontent"><ul>${newCon}</ul></div></div>` : ''}
    ${issues ? `<div class="final-card"><h3>🔍 업데이트된 미해결 쟁점 <span class="badge badge-orange">추적 중</span></h3><div class="fcontent"><ul>${issues}</ul></div></div>` : ''}
    <div class="final-card">
      <h3>🎯 최종 권고 & 다음 행동 <span class="badge badge-purple">Action</span></h3>
      <div class="fcontent"><p>${esc(r.final_recommendation || '')}</p><div class="divider"></div><ul>${steps}</ul></div>
    </div>
    <p style="font-size:.7rem;color:var(--mu);text-align:center;padding:6px 0 16px">※ 의료적 결정은 반드시 신경과 전문의와 상담하세요.</p>`;
}

// ═══════════════════════════════════════════════
// VIEWS
// ═══════════════════════════════════════════════
function switchView(view, btn) {
  S.currentView = view;
  document.querySelectorAll('.sb-btn').forEach(b => b.classList.remove('active'));
  const navBtn = document.getElementById('nav-' + view);
  if (navBtn) navBtn.classList.add('active');
  const titles = { home:'홈 — 누적 협진 기록', session:'현재 세션', history:'세션 기록', 'drive-connect':'Google Drive 연결' };
  document.getElementById('topbar-title').textContent = titles[view] || 'Orangi Migraine';
  renderView(view);
}

function renderView(view) {
  const area = document.getElementById('content');
  if (view === 'drive-connect') area.innerHTML = renderConnect();
  else if (view === 'home')     area.innerHTML = renderHome();
  else if (view === 'session')  area.innerHTML = renderSession();
  else if (view === 'history')  area.innerHTML = renderHistory();
}

function renderLoading(msg) {
  document.getElementById('content').innerHTML = `<div class="loading-screen"><div class="loading-spin"></div><p>${esc(msg)}</p></div>`;
}
function renderError(msg) {
  document.getElementById('content').innerHTML = `<div style="padding:40px"><div class="err-box" style="white-space:pre-wrap">${esc(msg)}</div></div>`;
}

// CONNECT VIEW
function renderConnect() {
  return `<div class="connect-screen">
    <div class="connect-icon">🧠</div>
    <div class="connect-title">Orangi Migraine AI 협진 시스템</div>
    <div class="connect-desc">Google Drive에 연결하면 모든 세션 기록과 누적 협진 지식이 클라우드에 안전하게 저장됩니다.<br>어떤 기기에서든 이어서 사용할 수 있어요.</div>
    <button class="btn-connect" onclick="signIn()">
      <svg width="18" height="18" viewBox="0 0 24 24"><path fill="#fff" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#fff" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#fff" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#fff" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
      Google Drive 연결
    </button>
    <div class="connect-note">연결 후 Drive에 <code>orangi_master.json</code> 파일이 생성됩니다. 매주 자동 백업도 저장돼요.</div>
  </div>`;
}

// HOME VIEW
function renderHome() {
  const accum = S.master?.accumulated;
  const sessions = S.master?.sessions || [];

  const conList = accum?.established_consensus?.length
    ? accum.established_consensus.map(x => `<div class="accum-item consensus">✅ ${esc(x)}</div>`).join('')
    : '<div class="accum-empty">아직 없음 — 첫 세션 후 누적됩니다</div>';

  const discList = accum?.discarded_hypotheses?.length
    ? accum.discarded_hypotheses.map(x => `<div class="accum-item discarded">❌ ${esc(x)}</div>`).join('')
    : '<div class="accum-empty">없음</div>';

  const issueList = accum?.unresolved_issues?.length
    ? accum.unresolved_issues.map(x => `<div class="accum-item unresolved">🔍 ${esc(x)}</div>`).join('')
    : '<div class="accum-empty">없음</div>';

  const recentSessions = sessions.slice(0, 3).map((s, i) => `
    <div class="session-hist-item" onclick="viewSession(${i})">
      <div class="hist-date">${s.date} · R${s.rounds?.length || 0}</div>
      <div class="hist-q">${esc((s.question || '').substring(0, 80))}${(s.question || '').length > 80 ? '...' : ''}</div>
      ${s.summary ? `<div class="hist-meta">요약: ${esc((s.summary.session_summary || '').substring(0, 60))}...</div>` : '<div class="hist-meta">요약 없음</div>'}
    </div>`).join('');

  const lastUpdated = accum?.last_updated ? new Date(accum.last_updated).toLocaleDateString('ko-KR') : '없음';

  return `
    <button class="btn-new-session" onclick="startNewSession()">
      💬 새 세션 시작 — 오늘의 질문 입력
    </button>

    <div class="card">
      <div class="card-title">🧠 누적 협진 지식 <span class="badge badge-green">Drive 동기화</span> <span style="font-size:.7rem;color:var(--mu);font-family:var(--mono);margin-left:auto">최종 업데이트: ${lastUpdated}</span></div>

      <div class="accum-section">
        <div class="accum-label">확립된 합의 (${accum?.established_consensus?.length || 0}건)</div>
        <div class="accum-list">${conList}</div>
      </div>
      <div class="divider"></div>
      <div class="accum-section">
        <div class="accum-label">미해결 쟁점 (${accum?.unresolved_issues?.length || 0}건)</div>
        <div class="accum-list">${issueList}</div>
      </div>
      <div class="divider"></div>
      <div class="accum-section">
        <div class="accum-label">폐기된 가설 (${accum?.discarded_hypotheses?.length || 0}건)</div>
        <div class="accum-list">${discList}</div>
      </div>
    </div>

    ${sessions.length ? `
    <div class="card">
      <div class="card-title">📅 최근 세션</div>
      ${recentSessions}
      ${sessions.length > 3 ? `<div style="text-align:center;margin-top:8px"><button class="btn-cancel" onclick="switchView('history')" style="font-size:.78rem">전체 ${sessions.length}개 보기</button></div>` : ''}
    </div>` : ''}`;
}

// SESSION VIEW
function renderSession() {
  if (!S.session) return `<div class="hint">홈에서 "새 세션 시작"을 눌러 주세요.</div>`;
  const sess = S.session;
  const curRound = sess.currentRound;

  const aiCards = Object.entries(AI_DEFS).map(([id, def]) => {
    const ans = curRound > 0 ? (sess.rounds[curRound - 1]?.answers?.[id] || '') : '';
    return `
    <div class="ai-card" data-ai="${id}">
      <div class="ai-head">
        <div class="ai-dot" style="background:${def.color}"></div>
        <span class="ai-name" style="color:${def.color}">${def.name}</span>
        <span class="ai-role">${def.role}</span>
        <span id="chip-${id}" class="ai-chip"></span>
      </div>
      <div class="ai-body">
        <textarea id="ans-${id}" class="${ans ? '' : 'gen'}"
          placeholder="${curRound === 0 ? '라운드를 시작하면 자동으로 답변이 생성됩니다...' : '생성 중...'}">${esc(ans)}</textarea>
      </div>
    </div>`;
  }).join('');

  const roundDots = [1,2,3].map(n => {
    const colors = {1:'var(--r1)',2:'var(--r2)',3:'var(--r3)'};
    const state = curRound > n ? 'done' : curRound === n ? 'active' : 'waiting';
    const c = colors[n];
    const style = state === 'active' ? `background:${c};color:#fff;border-color:${c}` : state === 'done' ? `border-color:${c};color:${c}` : `border-color:#3a4a5a;color:#3a4a5a`;
    return `<span class="round-pill ${state}" style="${style}">R${n}${state === 'done' ? ' ✓' : ''}</span>`;
  }).join('');

  return `
    <div class="q-bar">
      <div class="q-label" style="color:var(--r1)">● 오늘의 질문 / 분석 주제</div>
      <textarea id="q-input" rows="2"
        placeholder="예) 현재 NRS 4~5 패턴이 3주째 지속 중입니다. GON4 타이밍과 MOH 위험도를 어떻게 판단해야 할까요?"
        ${curRound > 0 ? 'readonly style="color:var(--mu)"' : ''}>${esc(sess.question || '')}</textarea>
    </div>

    <div class="round-bar">
      <span style="font-size:.72rem;color:#5a7a95;font-family:var(--mono)">진행:</span>
      ${roundDots}
      <span style="font-size:.72rem;color:#3a5a6a;margin-left:auto;font-family:var(--mono)">${curRound === 0 ? '시작 전' : curRound === 4 ? '세션 완료' : `Round ${curRound} 진행 중`}</span>
    </div>

    <div id="action-bar">${renderActionBar(curRound)}</div>

    <div class="ai-grid">${aiCards}</div>

    <div id="summary-area">${sess.summary ? renderSummaryResult(sess.summary) : ''}</div>`;
}

function renderActionBar(curRound) {
  if (curRound === 4) {
    return `<div class="round-action-bar" style="border-color:#10b98155;background:#f0fdf4">
      <span style="color:var(--gr);font-size:.85rem;font-weight:600">✅ 세션 완료 — Drive에 저장됨</span>
      <button class="btn-run-round green" onclick="startNewSession()" style="margin-left:auto">새 세션 시작</button>
    </div>`;
  }
  if (curRound === 3) {
    return `<div class="round-action-bar">
      <button class="btn-run-round green" id="final-btn" onclick="runFinalSummary()">
        <div class="spin" id="final-sp"></div>
        <span id="final-btn-txt">✅ 세션 종료 & Drive 저장</span>
      </button>
      <span class="run-note">Claude가 전체 세션을 요약하고 누적 지식을 업데이트한 뒤 Drive에 저장합니다</span>
    </div>`;
  }
  const nextRound = curRound + 1;
  const labels = {
    1: { btn: '⚡ Round 1 시작 — 4개 AI 동시 답변', note: '모든 AI가 환자 컨텍스트 + 누적 지식을 바탕으로 독립 분석합니다' },
    2: { btn: '🔄 Round 2 시작 — 크로스체크', note: 'AI들이 서로의 Round 1 답변을 읽고 분석을 발전시킵니다' },
    3: { btn: '🔄 Round 3 시작 — 최종 수렴', note: 'AI들이 Round 2를 기반으로 최종 통합 분석을 작성합니다' },
  };
  const l = labels[nextRound];
  return `<div class="round-action-bar">
    <button class="btn-run-round" id="run-btn" onclick="runRound(${nextRound})">
      <div class="spin" id="run-sp"></div>
      ${l.btn}
    </button>
    <span class="run-note">${l.note}</span>
  </div>`;
}

// HISTORY VIEW
function renderHistory() {
  const sessions = S.master?.sessions || [];
  if (!sessions.length) return `<div class="hint">아직 저장된 세션이 없어요.<br>첫 세션을 완료하면 자동으로 저장됩니다.</div>`;

  if (S.viewingHistIdx !== null && sessions[S.viewingHistIdx]) {
    return renderHistDetail(sessions[S.viewingHistIdx], S.viewingHistIdx);
  }

  return `<div style="margin-bottom:14px;display:flex;align-items:center;gap:10px">
    <span style="font-size:.87rem;color:var(--mu)">총 ${sessions.length}개 세션</span>
  </div>` +
  sessions.map((s, i) => `
    <div class="session-hist-item" onclick="viewSession(${i})">
      <div class="hist-date">${s.date} · Round ${s.rounds?.length || 0}까지 완료</div>
      <div class="hist-q">${esc((s.question || '').substring(0, 100))}${(s.question || '').length > 100 ? '...' : ''}</div>
      ${s.summary ? `<div class="hist-meta">✅ ${esc((s.summary.session_summary || '').substring(0, 80))}...</div>` : ''}
    </div>`).join('');
}

function viewSession(idx) {
  S.viewingHistIdx = idx;
  switchView('history');
}

function renderHistDetail(s, idx) {
  const rounds = (s.rounds || []).map(r => `
    <div class="card">
      <div class="card-title">Round ${r.round}</div>
      ${Object.entries(AI_DEFS).map(([id, def]) => `
        <div style="margin-bottom:12px">
          <div style="font-size:.72rem;font-weight:700;color:${def.color};letter-spacing:.05em;text-transform:uppercase;margin-bottom:5px">${def.name}</div>
          <div style="font-size:.83rem;line-height:1.72;color:#2a2a2a;white-space:pre-wrap;background:var(--sf2);border-radius:7px;padding:10px 12px">${esc(r.answers?.[id] || '(없음)')}</div>
        </div>`).join('')}
    </div>`).join('');

  const summary = s.summary;
  const steps = summary?.next_steps?.map((st, i) => `<li><strong>Step ${i+1}.</strong> ${esc(st)}</li>`).join('') || '';

  return `
    <div style="margin-bottom:14px;display:flex;align-items:center;gap:10px">
      <button class="btn-cancel" onclick="S.viewingHistIdx=null;renderView('history')">← 목록으로</button>
      <span style="font-size:.87rem;font-weight:600">${s.date}</span>
    </div>
    <div class="card">
      <div class="card-title">질문</div>
      <div style="font-size:.87rem;line-height:1.7">${esc(s.question || '')}</div>
    </div>
    ${rounds}
    ${summary ? `
    <div class="final-card">
      <h3>✅ 세션 요약 <span class="badge badge-green">저장됨</span></h3>
      <div class="fcontent"><p>${esc(summary.session_summary || '')}</p></div>
      ${steps ? `<div class="divider"></div><ul class="fcontent">${steps}</ul>` : ''}
    </div>` : ''}`;
}

function updateHistCount() {
  const el = document.getElementById('history-count');
  if (el) el.textContent = S.master?.sessions?.length || 0;
}

// ═══════════════════════════════════════════════
// SETTINGS
// ═══════════════════════════════════════════════
const KEY_INFO = {
  gpt:    { label: 'OpenAI (GPT)', link: 'https://platform.openai.com/api-keys',    note: 'platform.openai.com → API Keys' },
  claude: { label: 'Anthropic (Claude)', link: 'https://console.anthropic.com/',    note: 'console.anthropic.com → API Keys' },
  gemini: { label: 'Google (Gemini)', link: 'https://aistudio.google.com/app/apikey', note: 'aistudio.google.com → Get API Key' },
  perp:   { label: 'Perplexity', link: 'https://www.perplexity.ai/settings/api',   note: 'perplexity.ai → Settings → API' },
};

function openKeys() {
  document.getElementById('keys-body').innerHTML = Object.entries(KEY_INFO).map(([id, info]) => {
    const def = AI_DEFS[id];
    const hasKey = !!S.keys[id];
    return `<div class="key-group">
      <div class="key-row">
        <div class="key-label"><div class="ai-dot" style="background:${def?.color}"></div>${info.label}
          <span style="font-size:.68rem;font-family:var(--mono);padding:2px 6px;border-radius:3px;${hasKey?'background:#0d2a1a;color:#2d8a5a':'background:#2a1a0a;color:#8a5a2d'}">${hasKey?'✓ 설정됨':'미설정'}</span>
        </div>
        <a class="key-link" href="${info.link}" target="_blank">발급 →</a>
      </div>
      <div class="key-input-row">
        <input class="key-input ${hasKey?'set':''}" type="password" id="key-${id}" value="${hasKey?S.keys[id]:''}" placeholder="API 키 입력...">
        <button class="btn-vis" onclick="toggleVis('key-${id}',this)">표시</button>
      </div>
      <div class="key-note">💡 ${info.note}</div>
    </div><hr style="border:none;border-top:1px solid var(--bd);margin:2px 0">`;
  }).join('');
  openModal('keys-modal');
}

function saveKeys() {
  Object.keys(KEY_INFO).forEach(id => {
    const v = (document.getElementById('key-' + id)?.value || '').trim();
    if (v) S.keys[id] = v; else delete S.keys[id];
  });
  localStorage.setItem('om_keys', JSON.stringify(S.keys));
  closeModal('keys-modal');
  showToast('✅ API 키 저장됨');
}

function toggleVis(inputId, btn) {
  const el = document.getElementById(inputId);
  if (!el) return;
  el.type = el.type === 'password' ? 'text' : 'password';
  btn.textContent = el.type === 'password' ? '표시' : '숨기기';
}

function openCtx() {
  document.getElementById('ctx-ta').value = S.master?.patient_context || DEFAULT_CONTEXT;
  openModal('ctx-modal');
}

async function saveCtx() {
  if (!S.master) return;
  S.master.patient_context = document.getElementById('ctx-ta').value;
  await saveMaster();
  closeModal('ctx-modal');
  showToast('✅ 컨텍스트 저장 & Drive 동기화');
}

// ═══════════════════════════════════════════════
// MODAL & TOAST
// ═══════════════════════════════════════════════
function openModal(id)  { document.getElementById(id)?.classList.add('show'); }
function closeModal(id) { document.getElementById(id)?.classList.remove('show'); }

let _toastTimer;
function showToast(msg, duration = 2800) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(_toastTimer);
  _toastTimer = setTimeout(() => el.classList.remove('show'), duration);
}

// ═══════════════════════════════════════════════
// UTILS
// ═══════════════════════════════════════════════
function esc(s) {
  return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
</script>
